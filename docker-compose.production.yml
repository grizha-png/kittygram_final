volumes:
  pg_data:
  static:
  media:

services:
  db:
    container_name: db
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    container_name: backend
    image: ${DOCKERHUB_USERNAME}/kittygram_backend:latest
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/static_backend
      - media:/app/media
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 kittygram_backend.wsgi"

  frontend:
    container_name: frontend
    image: ${DOCKERHUB_USERNAME}/kittygram_frontend:latest
    command: sh -c "cp -r /app/build/. /static/"
    volumes:
      - static:/static

  gateway:
    container_name: gateway
    image: ${DOCKERHUB_USERNAME}/kittygram_gateway:latest
    depends_on:
      - backend
      - frontend
    ports:
      - 9000:80
    volumes:
      - static:/static
      - media:/media
