name: Kittygram CI/CD

on:
  push:

jobs:
  backend_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install linters
        run: pip install ruff pycodestyle

      - name: Run ruff check
        run: ruff check backend

      - name: Run ruff format check
        run: ruff format --check backend

      - name: Run pycodestyle
        run: pycodestyle --max-line-length=88 backend

  backend_tests:
    runs-on: ubuntu-latest
    needs: backend_lint
    env:
      SECRET_KEY: django-insecure-ci
      ALLOWED_HOSTS: 127.0.0.1,localhost
      DEBUG: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run backend tests
        run: python backend/manage.py test

  frontend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: CI=true npm test -- --watchAll=false
        working-directory: frontend

  build_and_push_to_docker_hub:
    runs-on: ubuntu-latest
    needs:
      - backend_tests
      - frontend_tests
    if: github.ref_name == 'main' || github.ref_name == 'master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_gateway:latest

  send_telegram_message:
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    if: success() && (github.ref_name == 'main' || github.ref_name == 'master')
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Kittygram CI/CD завершён успешно.
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref_name }}
            Автор push: ${{ github.actor }}
            Коммит: ${{ github.event.head_commit.message }}
            Ссылка: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
