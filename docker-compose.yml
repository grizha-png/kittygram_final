volumes:
  pg_data:
  static:
  media:

services:
  db:
    container_name: db
    image: postgres:13
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    container_name: backend
    build: ./backend/
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static:/app/static_backend
      - media:/app/media
    command: >
      sh -c "until python -c 'import socket; s = socket.socket(); s.connect((\"db\", 5432)); s.close()' 2>/dev/null; do sleep 1; done &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 kittygram_backend.wsgi"
  frontend:
    container_name: frontend
    build: ./frontend/
    command: sh -c "cp -r /app/build/. /static/"
    volumes:
      - static:/static
  gateway:
    container_name: gateway
    build: ./nginx/
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - 9000:80
    volumes:
      - static:/static
      - media:/media
